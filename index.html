<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Nota Materiales Estrella</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
        --naranja-estrella: #f39c12;
        --negro-footer: #333333;
    }

    html, body {
        height: 100%;
        margin: 0;
    }

    body {
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

   
    .contenido-principal {
        flex: 1 0 auto;
    }

    .footer-nota {
        flex-shrink: 0;
        background-color: var(--negro-footer);
        color: white;
        padding: 20px;
        border-radius: 0 50px 0 0;
    }

    @media print {
        @page {
            size: letter;
            margin: 0.5cm;
        }

        body {
            display: block !important; 
            height: auto !important;
        }

        .no-print { display: none !important; }

        
        .footer-nota {
            margin-top: 2cm !important; 
            position: relative !important;
            page-break-inside: avoid;
            -webkit-print-color-adjust: exact !important;
        }

  
        .contenido-principal {
            min-height: 15cm; 
        }
    }

    .header-diseno {
        background: var(--naranja-estrella);
        height: 100px;
        clip-path: polygon(0 0, 100% 0, 100% 70%, 0% 100%);
        -webkit-print-color-adjust: exact !important;
    }
</style>
</head>

<body>

    <div class="container mt-4 no-print">
        <div class="card p-3 shadow-sm mb-3">
            <h5>Controles de la Nota</h5>
            <div class="row">
                <div class="col-md-6">
                    <input type="text" id="input-cliente" class="form-control" placeholder="Nombre del Cliente">
                </div>
                <div class="col-md-6">
                    <button class="btn btn-primary w-100" id="btn-actualizar">Actualizar Nota</button>
                </div>
            </div>
        </div>

        <div class="card p-3 shadow-sm">
            <h5>Agregar Material</h5>
            <div class="row g-2">
                <div class="col-md-4">
                    <select id="input-producto" class="form-control">
                        <option value="" disabled selected>Selecciona un material...</option>
                        <option value="Arena">Arena</option>
                        <option value="Grava">Grava</option>
                        <option value="Gravilla">Gravilla</option>
                        <option value="Tucuruguay">Tucuruguay</option>
                        <option value="Piedra">Piedra</option>
                        <option value="Varilla 1/2">Varilla 1/2</option>
                        <option value="Varilla 3/8">Varilla 3/8</option>
                        <option value="Cemento Apasco">Cemento Apasco</option>
                        <option value="Cemento Americano">Cemento Americano</option>
                        <option value="Block">Block</option>
                        <option value="Alambre">Alambre</option>
                        <option value="Alambron">Alambron</option>
                        <option value="Clavo">Clavo</option>
                        <option value="Armes">Armes</option>
                        <option value="Mortero">Mortero</option>
                        <option value="Mortar">Mortar</option>
                    </select>
                </div>
                <div class="col-md-2"><input type="number" id="input-cantidad" class="form-control" placeholder="Cant.">
                </div>
                <div class="col-md-2"><input type="number" id="input-precio" class="form-control" placeholder="Precio">
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100" id="btn-agregar-item"><i class="fas fa-plus"></i>
                        Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <div class="header-diseno"></div>
    <main class="container flex-grow-1">
        <div class="row">
            <div class="col-8">
                <h1 class="fw-bold">NOTA</h1>
                <p><strong>Cliente:</strong> <span id="nombre-cliente">Cliente General</span></p>
                <p><strong>Fecha:</strong> <span id="fecha-Nota"></span></p>
            </div>
            <div class="col-4 text-end">
                <h5 class="text-uppercase fw-bold">Materiales Estrella</h5>
                <small>"Más que materiales, Soluciones estelares"</small>
            </div>
        </div>

        <table class="table tabla-nota mt-4">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>Precio</th>
                    <th class="text-end">Subtotal</th>
                    <th class="no-print">Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
            <tfoot>
                <tr>
                    <td colspan="3" class="text-end fw-bold">Total</td>
                    <td id="total-final" class="text-end fw-bold">$0.00</td>
                </tr>
            </tfoot>
        </table>

        <div class="no-print text-center mt-4">
            <button class="btn btn-dark btn-lg px-5" onclick="window.print()">
                <i class="fas fa-print me-2"></i>Imprimir / Guardar PDF
            </button>
        </div>
    </main>

    <div class="footer-nota">
        <div class="container">
            <div class="row text-center">
                <div class="col d-flex flex-column align-items-center">
                    <div>
                        <i class="fas fa-location-dot" style="color: red"></i>
                        <strong>Dirección</strong>
                    </div>
                    <span style="font-size: 0.85rem;">Av. Principal #456, Tijuana, B.C.</span>
                </div>
                <div class="col"><i class="fab fa-facebook me-2"></i>Materiales Estrella</div>
                <div class="col"><i class="fas fa-phone me-2"></i> 663-318-8374</div>
            </div>
        </div>
    </div>

    <script>
        // Poner la fecha automáticamente al abrir la página
        window.onload = function () {
            const fechaActual = document.getElementById("fecha-Nota");
            const hoy = new Date();
            const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
            if (fechaActual) {
                fechaActual.innerText = hoy.toLocaleDateString('es-MX', opciones);
            }
        };

        // Lógica del nombre del cliente
        const btnActualizar = document.getElementById("btn-actualizar");
        const inputCliente = document.getElementById("input-cliente");
        const displayNombre = document.getElementById("nombre-cliente");

        btnActualizar.onclick = () => {
            if (inputCliente.value.trim() !== "") {
                displayNombre.innerText = inputCliente.value;
                inputCliente.value = "";
            }
        };

        // Lógica de la tabla de materiales
        let totalAcumulado = 0;
        const inputProd = document.getElementById('input-producto');
        const inputCant = document.getElementById('input-cantidad');
        const inputPrecio = document.getElementById('input-precio');
        const btnAgregar = document.getElementById('btn-agregar-item');
        const cuerpoTabla = document.getElementById('cuerpo-tabla');
        const displayTotal = document.getElementById('total-final');

        btnAgregar.onclick = () => {
            const producto = inputProd.value;
            const cantidad = parseFloat(inputCant.value);
            const precio = parseFloat(inputPrecio.value);

            if (!producto || isNaN(cantidad) || isNaN(precio)) {
                alert("Llena todos los campos");
                return;
            }

            const subtotal = cantidad * precio;
            totalAcumulado += subtotal;

            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td>${producto}</td>
                <td>${cantidad}</td>
                <td>$${precio.toFixed(2)}</td>
                <td class="text-end">$${subtotal.toFixed(2)}</td>
                <td class="text-end no-print">
                    <button class="btn btn-sm btn-danger btn-borrar"><i class="fas fa-trash"></i></button>
                </td>
            `;

            fila.querySelector('.btn-borrar').onclick = () => {
                totalAcumulado -= subtotal;
                displayTotal.innerText = `$${totalAcumulado.toFixed(2)}`;
                fila.remove();
            };

            cuerpoTabla.appendChild(fila);
            displayTotal.innerText = `$${totalAcumulado.toFixed(2)}`;
            inputProd.value = ""; inputCant.value = ""; inputPrecio.value = "";
            inputProd.focus();
        };

        // Salto de foco al elegir producto
        inputProd.addEventListener("change", function () {
            if (this.value !== "") {
                inputCant.focus();
            }
        });
    </script>
</body>

</html>
